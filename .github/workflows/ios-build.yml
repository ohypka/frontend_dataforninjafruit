name: iOS Build Test
on:
  push:
    branches: [ main]
  pull_request:
    branches: [ main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64
      - run: flutter pub get
      - run: flutter build ios --simulator --debug
      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: build/ios/iphonesimulator/Runner.app